<!DOCTYPE html>
<html>

<head>
    <title>Click Game</title>
</head>

<body>

    <h1>Click Counter Game 

</h1>

    <h2 id="score">Score: 0</h2>

    <button onclick="increaseScore()">Click Me</button>

    <script>
        let score = 0;

        function increaseScore() {
            score = score + 1;
            document.getElementById("score").innerText = "Score: " + score;
        }
    </script>

</body>

</html>
